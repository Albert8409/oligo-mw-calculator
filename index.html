let CATALOG = { monomers:[], vendors:[], skus:[], byCode:{} };
let catalogOpen=false, catalogQName="", catalogQCat="", lastSeqEl=null;

function parseCatalogInline(){
  const el=document.getElementById("catalogData");
  if(el && el.textContent.trim()){ try{ return JSON.parse(el.textContent); }catch(e){ console.warn("[catalog] inline parse failed", e); } }
  return { monomers:[], vendors:[] };
}
function catalogReady(cat){
  CATALOG.monomers = (cat.monomers||[]).filter(m=>m.code && typeof m.mass==='number');
  CATALOG.vendors  = cat.vendors && cat.vendors.length ? cat.vendors
                   : [...new Set(CATALOG.monomers.flatMap(m=>(m.vendor_products||[]).map(v=>v.vendor)))];
  CATALOG.byCode = {}; CATALOG.monomers.forEach(m=>{ CATALOG.byCode[m.code]=m; });
  CATALOG.skus = [];                                   // flatten to one row per purchasable SKU (search hits SKUs)
  CATALOG.monomers.forEach(m=>{ (m.vendor_products||[]).forEach(v=>CATALOG.skus.push({
    code:m.code, name:m.name, category:m.category, sugar:m.sugar, kind:m.kind||'base',
    hasPhos:!!m.hasPhos, mass:m.mass, verified:!!m.verified, verification:m.verification||'',
    vendor:v.vendor, catalog_no:v.catalog_no, product_name:v.product_name, source:v.source||'' })); });
}
// ---- hosted (Pro) catalog source: Supabase via PostgREST resource embedding; returns the SAME nested shape as the inline JSON ----
/* ---- Pro auth (Supabase email OTP; plain fetch, no library, no redirect) ---- */
const PRO_SESS_KEY='oligoProSession';
let proIsPro=false, proPending=false, _proEmail='';
function proSession(){ try{ return JSON.parse(localStorage.getItem(PRO_SESS_KEY)||'null'); }catch(_){ return null; } }
function setProSession(s){ if(s) localStorage.setItem(PRO_SESS_KEY, JSON.stringify(s)); else localStorage.removeItem(PRO_SESS_KEY); }
function sbBase(){ return (S.catalogSupabaseUrl||'').replace(/\/+$/,''); }
function sbAuthHeaders(){ return { apikey:(S.catalogSupabaseAnonKey||'').trim(), 'Content-Type':'application/json' }; }
async function proSendCode(email){
  const r=await fetch(sbBase()+'/auth/v1/otp',{method:'POST',headers:sbAuthHeaders(),body:JSON.stringify({email,create_user:true})});
  if(!r.ok) throw new Error((await r.text()).slice(0,180)); return true;
}
async function proVerifyCode(email, code){
  const tok=String(code).trim(); let lastErr='';
  for(const type of ['email','signup','magiclink']){          // OTP token type differs: returning login vs first-time signup
    const r=await fetch(sbBase()+'/auth/v1/verify',{method:'POST',headers:sbAuthHeaders(),body:JSON.stringify({email,token:tok,type})});
    if(r.ok){ const d=await r.json(); setProSession({access_token:d.access_token, refresh_token:d.refresh_token, expires_at:d.expires_at, email}); return true; }
    lastErr=(await r.text()).slice(0,180);
  }
  throw new Error(lastErr||'verification failed');
}
async function proAccessToken(){
  const s=proSession(); if(!s||!s.access_token) return null;
  if(s.expires_at && (s.expires_at*1000 - Date.now() > 60000)) return s.access_token;   // still valid
  try{                                                                                   // expired -> refresh
    const r=await fetch(sbBase()+'/auth/v1/token?grant_type=refresh_token',{method:'POST',headers:sbAuthHeaders(),body:JSON.stringify({refresh_token:s.refresh_token})});
    if(!r.ok) throw 0; const d=await r.json();
    setProSession({access_token:d.access_token, refresh_token:d.refresh_token, expires_at:d.expires_at, email:s.email});
    return d.access_token;
  }catch(_){ setProSession(null); return null; }
}
function proSignOut(){ setProSession(null); proIsPro=false; proPending=false; S.catalogSource='bundled'; save(); reloadCatalogSource(); if(catalogOpen) renderCatalog(); }
// status bar shown at the top of the catalog
function proBarHTML(){
  const s=proSession();
  if(proIsPro) return `<div class="pro-bar is-pro"><span>★ Pro — full catalog</span><span class="pro-meta">${s?s.email:''}</span><button class="pro-link" data-prosignout>Sign out</button></div>`;
  if(s) return `<div class="pro-bar pending"><span>Signed in — Pro access pending</span><span class="pro-meta">${s.email}</span><button class="pro-link" data-prosignout>Sign out</button></div>`;
  return `<div class="pro-bar"><span>Free catalog · 30 common monomers</span><button class="pro-cta" data-proupgrade>Upgrade to Pro ▸</button></div>`;
}
function openProAuth(){
  if(!sbBase()||!(S.catalogSupabaseAnonKey||'').trim()){ proErr('Pro catalog is not configured yet.'); calcs.forEach(c=>{ const g=c.querySelector('[data-catgate]'); if(g) g.hidden=(c.offsetParent===null); }); return; }
  calcs.forEach(c=>{ const g=c.querySelector('[data-catgate]'); if(g) g.hidden=(c.offsetParent===null); });
  proSetStep('email');
}
function closeProAuth(){ calcs.forEach(c=>{ const g=c.querySelector('[data-catgate]'); if(g) g.hidden=true; }); }
function proSetStep(step){
  const code = step==='code';
  calcs.forEach(c=>{
    const sE=c.querySelector('[data-prostep="email"]'), sC=c.querySelector('[data-prostep="code"]');
    const eml=c.querySelector('[data-proemail]'), cod=c.querySelector('[data-procode]');
    const snd=c.querySelector('[data-prosend]'), vfy=c.querySelector('[data-proverify]'), err=c.querySelector('[data-proerr]');
    if(err){ err.hidden=true; err.textContent=''; }
    if(sE) sE.hidden=code; if(sC) sC.hidden=!code;
    if(cod){ cod.hidden=!code; if(code) cod.value=''; }
    if(snd) snd.hidden=code; if(vfy) vfy.hidden=!code;
    const f = code?cod:eml; if(f && c.offsetParent!==null) setTimeout(()=>{ try{ f.focus(); }catch(_){ } },60);
  });
}
function proErr(msg){ calcs.forEach(c=>{ const e=c.querySelector('[data-proerr]'); if(e){ e.textContent=msg||''; e.hidden=!msg; } }); }
async function proDoSend(){
  const c=calcs.find(x=>x.offsetParent!==null)||calcs[0]; const eml=c&&c.querySelector('[data-proemail]');
  const email=((eml&&eml.value)||'').trim(); if(!/.+@.+\..+/.test(email)){ proErr('Enter a valid email.'); return; }
  _proEmail=email; proErr(''); const btn=c.querySelector('[data-prosend]'); if(btn){ btn.disabled=true; btn.textContent='Sending…'; }
  try{ await proSendCode(email); calcs.forEach(x=>{ const l=x.querySelector('[data-proemaillabel]'); if(l) l.textContent=email; }); proSetStep('code'); }
  catch(e){ proErr('Could not send code: '+e.message); }
  finally{ if(btn){ btn.disabled=false; btn.textContent='Send code'; } }
}
async function proDoVerify(){
  const c=calcs.find(x=>x.offsetParent!==null)||calcs[0]; const cod=c&&c.querySelector('[data-procode]');
  const code=((cod&&cod.value)||'').trim(); if(!/^[0-9]{6,10}$/.test(code)){ proErr('Enter the numeric code from your email.'); return; }
  proErr(''); const btn=c.querySelector('[data-proverify]'); if(btn){ btn.disabled=true; btn.textContent='Verifying…'; }
  try{
    await proVerifyCode(_proEmail, code);
    S.catalogSource='supabase'; save();                 // signed in -> pull the live (gated) catalog
    closeProAuth();
    const cat=await loadCatalog(); catalogReady(cat); rebuildCustom(); applyAll(); renderCatalog();
  }catch(e){ proErr('Verification failed: '+e.message); }
  finally{ if(btn){ btn.disabled=false; btn.textContent='Verify'; } }
}

async function fetchFromSupabase(){
  const base = (S.catalogSupabaseUrl||'').replace(/\/+$/,'');
  const key  = (S.catalogSupabaseAnonKey||'').trim();
  if(!base || !key) throw new Error('Supabase URL or anon key missing');
  const sel = 'code,name,category,sugar,kind,has_phos,mass,verified,verification,nucleoside_formula,'
            + 'vendor_products(vendor,catalog_no,product_name,source)';
  const tok = await proAccessToken();                  // signed-in Pro user -> JWT; else anon key (RLS returns free-30)
  const res = await fetch(`${base}/rest/v1/monomers?select=${encodeURIComponent(sel)}`, {
    headers:{ apikey:key, Authorization:'Bearer '+(tok||key), Accept:'application/json' }
  });
  if(!res.ok) throw new Error('Supabase '+res.status+' '+(await res.text()).slice(0,160));
  const rows = await res.json();
  const monomers = rows.map(m=>({                       // map snake_case -> the keys catalogReady() expects (only has_phos differs)
    code:m.code, name:m.name, category:m.category, sugar:m.sugar, kind:m.kind, nucleoside_formula:m.nucleoside_formula,
    hasPhos:!!m.has_phos, mass:Number(m.mass),
    verified:!!m.verified, verification:m.verification||'',
    vendor_products:(m.vendor_products||[]).map(v=>({
      vendor:v.vendor, catalog_no:v.catalog_no, product_name:v.product_name, source:v.source||'' }))
  }));
  const vendors = [...new Set(monomers.flatMap(m=>m.vendor_products.map(v=>v.vendor)))];
  const _signed=!!proSession(); proIsPro=_signed && monomers.length>30; proPending=_signed && !proIsPro;   // infer Pro state from what RLS returned
  return { monomers, vendors };
}
// chosen source: bundled inline (offline default) or Supabase (Pro) override, with graceful fallback to bundled
function loadCatalog(){
  if(S.catalogSource==='supabase' && S.catalogSupabaseUrl && S.catalogSupabaseAnonKey){
    return fetchFromSupabase().catch(e=>{ console.warn('[catalog] Supabase failed, falling back to bundled:', e); return parseCatalogInline(); });
  }
  return Promise.resolve(parseCatalogInline());
}
let _catReloadT=null;
function reloadCatalogSource(){ clearTimeout(_catReloadT); _catReloadT=setTimeout(()=>{ loadCatalog().then(cat=>{ catalogReady(cat); rebuildCustom(); applyAll(); if(catalogOpen) renderCatalog(); }).catch(()=>{}); }, 350); }

// merge catalog monomers into the engine's CUSTOM map — NON-DESTRUCTIVE (never writes S/localStorage)
function mergeCatalogIntoCustom(){
  if(!S.catalogEnabled) return;
  (CATALOG.monomers||[]).forEach(c=>{
    if(CUSTOM[c.code]) return;                         // NEVER shadow a user-defined code
    const conj=(c.kind==='conj');
    CUSTOM[c.code]={ code:c.code, name:c.name, mass:c.mass, hasPhos:!!c.hasPhos, kind:c.kind||'base',
      nobond:conj, eff: conj ? c.mass : (c.hasPhos ? c.mass-LINK.PO : c.mass), _catalog:true };
  });
}
const __origRebuildCustom = rebuildCustom;             // wrap so the merge re-applies after every rebuild
rebuildCustom = function(){ __origRebuildCustom(); mergeCatalogIntoCustom(); };
catalogReady(parseCatalogInline());                    // sync: bundled populates CATALOG immediately (buildPanel + offline)
(function proInitFromHash(){                              // magic-link return: token lands in URL hash -> become a session
  try{
    const h=location.hash||''; if(h.indexOf('access_token=')<0) return;
    const p=new URLSearchParams(h.replace(/^#/,''));
    const at=p.get('access_token'), rt=p.get('refresh_token');
    if(at&&rt){
      const exp=Math.floor(Date.now()/1000)+(parseInt(p.get('expires_in'),10)||3600);
      const prev=proSession();
      setProSession({access_token:at, refresh_token:rt, expires_at:exp, email:(prev&&prev.email)||''});
      S.catalogSource='supabase'; save();
      try{ history.replaceState(null,'',location.pathname+location.search); }catch(_){}   // strip token from the address bar
    }
  }catch(_){}
})();
loadCatalog().then(cat=>{ catalogReady(cat); rebuildCustom(); if(typeof applyAll==='function') applyAll(); if(catalogOpen) renderCatalog(); });   // then load the chosen source (bundled re-applies harmlessly; Supabase overrides)

function setCatalog(open){
  if(open && !S.catalogEnabled) return;
  catalogOpen=open;
  if(open){ catalogQName=""; catalogQCat=""; if(typeof faqOpen!=='undefined' && faqOpen) setFaq(false); drawerOpen=false; renderCatalog(); }
  calcs.forEach(c=>{
    const el=c.querySelector("[data-catalog]"); if(el) el.hidden=!open;
    c.classList.toggle("catalog-open", open);
    const b=c.querySelector("[data-catopen]"); if(b){ b.classList.toggle("on",open); b.textContent=open?"✕ Catalog":"Catalog"; }
    if(open){ const dr=c.querySelector("[data-drawer]"); if(dr) dr.hidden=true; c.classList.remove("drawer-open"); }
  });
  if(open) scrollViewTop();
}
function renderCatalog(){
  const vendors=["all", ...(CATALOG.vendors||[])];
  const cats=["all", ...[...new Set((CATALOG.monomers||[]).map(m=>m.category))]];
  const vendorOpts=vendors.map(v=>`<option value="${v.replace(/"/g,'&quot;')}" ${(S.catalogVendor||'all')===v?'selected':''}>${v==='all'?'All vendors':v}</option>`).join("");
  const catOpts=cats.map(c=>`<option value="${c.replace(/"/g,'&quot;')}" ${(S.catalogCategory||'all')===c?'selected':''}>${c==='all'?'All categories':c.replace("2'","2′")}</option>`).join("");
  const head=`
    <div class="catalog-top">
      <div class="catalog-head"><h4>Vendor catalog <span class="cat-count" data-catcount></span></h4>
        <button class="dclose" data-catclose>✕</button></div>
      ${proBarHTML()}
      <div class="catalog-controls">
        <label class="cat-ctl"><span>Vendor</span><select class="three-sel cat-vendorsel" data-catvendorsel>${vendorOpts}</select></label>
        <label class="cat-ctl"><span>Category</span><select class="three-sel cat-catsel" data-catcatsel>${catOpts}</select></label>
      </div>
      <div class="catalog-search2">
        <input class="cat-search" data-catsearch-name placeholder="Name / compound (e.g. deoxy)" spellcheck="false" value="${(catalogQName||'').replace(/"/g,'&quot;')}" />
        <input class="cat-search cat-search-cat" data-catsearch-cat placeholder="Catalog #" spellcheck="false" value="${(catalogQCat||'').replace(/"/g,'&quot;')}" />
      </div>
    </div>
    <div class="catalog-list" data-catlist></div>`;
  calcs.forEach(c=>{ const b=c.querySelector("[data-catbody]"); if(b) b.innerHTML=head; });
  renderCatalogList();
}
function catFilteredSkus(){
  const vf=S.catalogVendor||'all', cf=S.catalogCategory||'all';
  const qn=(catalogQName||'').trim().toLowerCase(), qc=(catalogQCat||'').trim().toLowerCase();
  return (CATALOG.skus||[]).filter(s=>{
    if(vf!=='all' && s.vendor!==vf) return false;
    if(cf!=='all' && s.category!==cf) return false;
    if(qn){ if(((s.product_name+' '+s.name+' '+s.code).toLowerCase()).indexOf(qn)<0) return false; }
    if(qc){ if((String(s.catalog_no||'').toLowerCase()).indexOf(qc)<0) return false; }
    return true;
  });
}
function renderCatalogList(){
  const rows=catFilteredSkus();
  const lib=new Set((S.customBases||[]).map(c=>c.code));
  const html = rows.length ? rows.map(s=>{
    const tag=s.code.length>1?`(${s.code})`:s.code;
    const perPos=(s.kind==='conj') ? `+${s.mass.toFixed(2)} g/mol` : `+${(s.hasPhos?s.mass:s.mass+LINK.PO).toFixed(2)} g/mol/pos`;
    const inLib=lib.has(s.code);
    return `<div class="cat-item">
      <div class="cat-main">
        <div class="cat-name">${s.product_name}</div>
        <div class="cat-vendor">${s.vendor} · ${s.catalog_no}</div>
        <div class="cat-tags">
          <span class="cat-code">${tag}</span>
          <span class="cat-mass">${s.mass.toFixed(2)} g/mol · ${perPos}</span>
          <span class="cat-pill">${(s.category||'').replace("2'","2′")}</span>
          ${s.verified?`<span class="cat-verified">✓ ${s.verification||'verified'}</span>`:''}
          ${s.source?`<a class="cat-src" href="${s.source}" target="_blank" rel="noopener">source</a>`:''}
        </div>
      </div>
      <div class="cat-actions">
        <button class="cat-ins" data-catinsert="${s.code}">Insert ${tag}</button>
        ${inLib
          ? `<button class="cat-add in-lib" data-catremove="${s.code}" title="Remove from your library"><span class="lib-on">✓ In library</span><span class="lib-rm">✕ Remove</span></button>`
          : `<button class="cat-add" data-catadd="${s.code}">+ Library</button>`}
      </div>
    </div>`;
  }).join("") : `<div class="cat-empty">No matches. Try a different vendor, category, or search term.</div>`;
  calcs.forEach(c=>{ const l=c.querySelector("[data-catlist]"); if(l) l.innerHTML=html;
    const cc=c.querySelector("[data-catcount]"); if(cc) cc.textContent=rows.length?("· "+rows.length):""; });
}
function insertCatalogCode(code){
  const tk = code.length>1 ? `(${code})` : code;
  let ta = (lastSeqEl && document.contains(lastSeqEl) && lastSeqEl.offsetParent!==null) ? lastSeqEl : null;
  if(!ta){ ta = document.querySelector(".calc [data-seq]"); }     // default to the sense field
  if(!ta) return;
  const isAnti = ta.matches("[data-antiseq]");
  const seqKey = isAnti ? 'antiSeq' : 'seq';
  const fKey = isAnti ? S.antiFive : S.five, fThio = isAnti ? false : S.fiveThio;
  const threeK = isAnti ? S.antiThree : S.three;
  const v = ta.value, L = lockLen(fKey), R = lockRight(threeK), rs = v.length - R;
  let a = Math.max(Math.min((ta.selectionStart!=null?ta.selectionStart:v.length), rs), L);
  let b = Math.max(Math.min((ta.selectionEnd!=null?ta.selectionEnd:v.length), rs), L);
  let nv = v.slice(0,a) + tk + v.slice(b); let pos = a + tk.length;
  nv = enforceFive(nv, fKey, fThio, S.type); nv = enforceThree(nv, threeK);
  S[seqKey] = nv;
  setCatalog(false);
  applyAll();
  const ta2 = document.querySelector(".calc [data-"+(isAnti?'antiseq':'seq')+"]");
  if(ta2){ ta2.focus(); try{ ta2.setSelectionRange(pos,pos); }catch(_){ } lastSeqEl=ta2; }
}
function addCatalogToLibrary(code){                    // the ONE place browsing writes saved data
  const m = CATALOG.byCode[code]; if(!m) return;
  S.customBases = S.customBases || [];
  if(!S.customBases.some(c=>c.code===code)){           // dedupe by code (B5.5)
    S.customBases.push({ code:m.code, name:m.name, mass:m.mass, hasPhos:!!m.hasPhos, kind:m.kind||'base' });
    save();
  }
  rebuildCustom(); applyAll();
}
function removeCatalogFromLibrary(code){               // remove a previously-added catalog monomer from the user's library
  S.customBases = (S.customBases||[]).filter(c=>c.code!==code);
  save(); rebuildCustom(); applyAll();
}
function openCatGate(){
  calcs.forEach(c=>{ const g=c.querySelector("[data-catgate]"); if(!g) return;
    const vis = c.offsetParent!==null; g.hidden = !vis;
    if(vis){ const err=g.querySelector("[data-catgateerr]"); if(err) err.hidden=true; const inp=g.querySelector("[data-catgateinput]"); if(inp){ inp.value=""; setTimeout(()=>{ try{ inp.focus(); }catch(_){ } },30); } }
  });
}
function closeCatGate(){ calcs.forEach(c=>{ const g=c.querySelector("[data-catgate]"); if(g) g.hidden=true; }); }
function tryCatUnlock(inp){
  if(!inp) return;
  if(inp.value === "ShengLab"){ S.catalogUnlocked=true; save(); closeCatGate(); setCatalog(true); }
  else { const g=inp.closest("[data-catgate]"); const err=g&&g.querySelector("[data-catgateerr]"); if(err) err.hidden=false; try{ inp.select(); }catch(_){ } }
}
document.querySelector(".kit").addEventListener("keydown", e=>{ if(e.target.matches && e.target.matches("[data-catgateinput]")){ if(e.key==="Enter"){ e.preventDefault(); tryCatUnlock(e.target); } else if(e.key==="Escape"){ e.preventDefault(); closeCatGate(); } } });
(function(){
  const kit=document.querySelector(".kit");
  kit.addEventListener("focusin", e=>{ const t=e.target.closest("[data-seq],[data-antiseq]"); if(t) lastSeqEl=t; });
  kit.addEventListener("click", e=>{
    if(e.target.closest("[data-catopen]")){ setCatalog(!catalogOpen); return; }   // free 30 open to all; Pro unlocks the full set via sign-in
    if(e.target.closest("[data-proupgrade]")){ openProAuth(); return; }
    if(e.target.closest("[data-procancel]")){ closeProAuth(); return; }
    if(e.target.closest("[data-prosend]")){ proDoSend(); return; }
    if(e.target.closest("[data-proverify]")){ proDoVerify(); return; }
    if(e.target.closest("[data-prosignout]")){ proSignOut(); return; }
    if(e.target.closest("[data-catgateunlock]")){ const g=e.target.closest("[data-catgate]"); tryCatUnlock(g&&g.querySelector("[data-catgateinput]")); return; }
    if(e.target.closest("[data-catgatecancel]")){ closeCatGate(); return; }
    if(e.target.closest("[data-catclose]")){ setCatalog(false); return; }
    const ins=e.target.closest("[data-catinsert]"); if(ins){ insertCatalogCode(ins.dataset.catinsert); return; }
    const add=e.target.closest("[data-catadd]"); if(add){ addCatalogToLibrary(add.dataset.catadd); renderCatalogList(); return; }
    const rm=e.target.closest("[data-catremove]"); if(rm){ removeCatalogFromLibrary(rm.dataset.catremove); renderCatalogList(); return; }
  });
  kit.addEventListener("input", e=>{
    if(e.target.matches("[data-catsearch-name]")){ catalogQName=e.target.value; renderCatalogList(); }
    else if(e.target.matches("[data-catsearch-cat]")){ catalogQCat=e.target.value; renderCatalogList(); }
  });
  kit.addEventListener("change", e=>{
    if(e.target.matches("[data-catvendorsel]")){ S.catalogVendor=e.target.value; save(); renderCatalogList(); }
    else if(e.target.matches("[data-catcatsel]")){ S.catalogCategory=e.target.value; save(); renderCatalogList(); }
  });
})();

/* boot */
rebuildCustom();
buildPanel();
applyAll();
</script>
