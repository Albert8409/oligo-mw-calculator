function wirePanel(){
  const p=document.getElementById("panel");
  p.querySelectorAll("[data-set]").forEach(b=>b.addEventListener("click",()=>{
    const k=b.dataset.set, v=b.dataset.val; S[k]=(k==="decimals")?+v:v;
    p.querySelectorAll(`[data-set="${k}"]`).forEach(x=>x.classList.toggle("is-active",x.dataset.val===v));
    applyAll();
  }));
  p.querySelectorAll("[data-accent]").forEach(a=>a.addEventListener("click",()=>{
    S.accent=a.dataset.accent;
    p.querySelectorAll("[data-accent]").forEach(x=>x.classList.toggle("is-active",x===a));
    applyAll();
  }));
  p.querySelectorAll("[data-slider]").forEach(sl=>sl.addEventListener("input",()=>{
    const k=sl.dataset.slider; S[k]=+sl.value;
    const v=p.querySelector(`[data-v="${k}"]`);
    if(v) v.textContent=(k==="fsBase"||k==="fsResult"||k==="radius"||k==="border")?S[k]+"px":S[k];
    applyAll();
  }));
  p.querySelectorAll("[data-select]").forEach(sel=>sel.addEventListener("change",()=>{ S[sel.dataset.select]=sel.value; applyAll(); }));
  p.querySelectorAll("[data-toggle]").forEach(t=>t.addEventListener("click",()=>{
    const k=t.dataset.toggle; S[k]=!S[k]; t.classList.toggle("on",S[k]); applyAll();
  }));
}

/* =================================================================
   FAQ  (collapsible help; MW vs Concentration section ordered by active tab)
   ================================================================= */
const FAQ_DATA = {
  mw: { title:"MW Calculator", items:[
    {q:"What does the MW Calculator do?", a:"Type an oligonucleotide sequence and it returns the molecular weight in g/mol, using the standard additive model: 5′-end + every nucleoside + every backbone linkage. <b>Example:</b> <code>ATCG</code> (DNA) → <b>1,173.83 g/mol</b>."},
    {q:"How do I enter a sequence?", a:"Type letters in the Sequence box, or tap the on-screen base buttons (keypad). The result updates live. You can paste a sequence too — spaces are ignored. <b>Example:</b> type <code>ATCGATCGAT</code> → 3,027.04 g/mol."},
    {q:"DNA, RNA, or Hybrid — what's the difference?", a:"<b>DNA</b> uses A/C/G/T (2′-deoxy). <b>RNA</b> uses A/C/G/U (ribose). Switching between them auto-swaps T↔U and recomputes. <b>Hybrid</b> lets you mix in one strand, but you must prefix every base with <code>d</code> or <code>r</code>. <b>Example (Hybrid):</b> <code>dAdCrGrU</code> = DNA-A, DNA-C, RNA-G, RNA-U."},
    {q:"Linkage: PO, PS, and Mixed", a:"<b>PO</b> = phosphodiester (natural). <b>PS</b> = phosphorothioate (one O→S per bond, +16.06 g/mol). <b>Mixed</b> lets you set bonds individually — type <code>s</code> between two bases for a PS bond there, otherwise it's PO. <b>Example:</b> <code>AsCsGT</code> = PS, PS, PO. Note there's no linkage after the last base (free 3′-OH)."},
    {q:"5′ end and 3′ end groups (and PS at the ends)", a:"<b>5′ end:</b> OH (default), 5′-Phosphate, or DMT. <b>3′ end:</b> OH, 3′-Phosphate, or an inverted base (Inverted dT/dA/dC/dG) — these show in the sequence as a locked tag (<code>P</code>, <code>idT</code>…) you can't delete; type to the left of it to add bases. <b>Phosphorothioate at an end:</b> put an <code>s</code> next to the end group and that linkage becomes PS (+16.06). <b>Example:</b> <code>ATCG s idT</code> = a PS linkage to the 3′ inverted-dT; <code>P s</code> at the 5′ = 5′-phosphorothioate. Inverted bases count as a nucleotide (+1 nt); a bare 3′-phosphate does not."},
    {q:"How do I make a phosphorothioate (PS) bond?", a:"Type a lowercase <code>s</code> at the bond you want as PS — each PS adds +16.06 g/mol versus PO. Set the strand to <b>PS</b> to make every bond PS, or <b>Mixed</b> and place <code>s</code> only where you want it. <b>Example:</b> <code>AsCsGT</code> = PS, PS, PO. An <code>s</code> also works next to an end group or a conjugate to make that junction PS (e.g. <code>BsAUCG</code> if <code>B</code> is a 5′ conjugate, or <code>ATCG s idT</code>). No <code>s</code> = PO."},
    {q:"Advanced: 2′-sugar modifications", a:"Tap <b>+ Advanced</b> to reveal keypads for 2′-OMe (<code>m</code>), 2′-F (<code>f</code>), 2′-MOE (<code>moe</code>), and 2′-cEt (<code>cEt</code>). Prefix any base. <b>Example:</b> <code>mAfCdG</code> = 2′-OMe-A, 2′-F-C, DNA-G."},
    {q:"What do the chips under the result mean?", a:"They summarize the strand at a glance: total length (nt), the number of PO and PS bonds, the end groups, any custom monomers, and the count of each base (A/C/G/T/U)."},
    {q:"Duplex mode (antisense + duplex MW)", a:"For double-stranded oligos (siRNA, ASOs) the <b>Duplex mode</b> control adds the second strand to the picture. <b>Off</b> = just your single strand. <b>Mirror</b> = the calculator automatically writes the matching antisense strand for you (the reverse-complement, where A pairs with T/U and G with C) and shows the antisense MW plus the combined duplex MW. <b>Manual</b> = you type the antisense strand yourself in a second box — use this when your real antisense isn't a simple complement (different modifications, mismatches, overhangs). The Manual box has its own 5′-end control and uses the keypad too. <b>Example (Mirror):</b> sense <code>ATCGATCG</code> → antisense <code>CGATCGAT</code>; duplex MW = sense + antisense. <b>Tip:</b> when duplex mode is on, the Concentration tab lets you base its math on the sense, antisense, or whole duplex."},
    {q:"Custom bases & conjugates — what are they?", a:"Tap <b>+ Custom bases</b> (Super Advanced) to define anything that isn't a standard base: an unusual nucleotide, or a dye/tag attached to your oligo. Give it a <b>name</b>, a short <b>code</b>, and its <b>mass</b>, then it becomes a code you can type in the sequence and a button on the keypad. Single-letter codes are typed bare (<code>Y</code>); 2+ letter codes are wrapped in parentheses (<code>(psU)</code>). Each item is either an <b>In-chain base</b> or a <b>Conjugate</b> — see the next question, it matters."},
    {q:"In-chain base vs Conjugate — what's the difference, and why does it change the mass?", a:"This is the key choice when you add a custom item, and it changes the result.<br><br><b>In-chain base</b> = a building block that sits <i>inside</i> the strand, like a normal letter. The calculator <b>automatically adds a backbone phosphate</b> (PO, or PS if your strand is phosphorothioate) to connect it, and it <b>counts as +1 in the length</b>. Use this for unusual nucleotides (e.g. pseudouridine).<br><br><b>Conjugate</b> = something hanging <i>off</i> the strand, like a dye or tag (Cy3, GalNAc, cholesterol, biotin). The calculator <b>adds only the mass you typed — no extra phosphate is added</b>, and it <b>does not change the length</b>. Use this for labels/attachments.<br><br><b>Worked example —</b> <code>AUCG(Cy3)</code>: if Cy3 is set to <b>In-chain base</b> it adds Cy3's mass <b>plus one phosphate (≈62 g/mol)</b> and the strand reads 5 nt. If Cy3 is set to <b>Conjugate</b> it adds <b>just Cy3's mass</b>, no phosphate, and the strand stays 4 nt. So the two differ by about one phosphate. Why isn't it automatic? Dye/linker chemistries vary, and vendors often quote a mass that already includes the linker — so you tell the calculator which case you have. <b>Forgot which you picked?</b> In the list, tap the soft <b>base / conjugate</b> pill next to any item to switch it instantly."},
    {q:"⚠ Custom bases: read this so your mass is right", a:"The calculator can't know the chemistry of something you invented, so <b>you</b> must set it correctly — a wrong setting here is the easiest way to get a wrong mass. Get three things right: <b>(1) Kind</b> — <b>In-chain base</b> (sits in the strand, gets a backbone phosphate, +1 nt) vs <b>Conjugate</b> (a tag hanging off; adds only its mass, no phosphate, no length). <b>(2) Mass basis</b> (in-chain only) — did you enter the <b>free nucleoside</b> mass (no phosphate; the app adds it) or the <b>residue</b> mass (phosphate already included)? Set the toggle to match your number; the live preview shows the per-position result to confirm. <b>(3) Sanity-check</b> the preview, length, and chips after adding — they reveal instantly if the kind/basis is wrong. You can tap the <b>base / conjugate</b> pill in the list to switch kind anytime, and an <code>s</code> next to a conjugate makes that junction PS (+16.06). When unsure, verify a known oligo against a trusted value first."},
    {q:"Custom in-chain base: why is \"g/mol/pos\" higher than the MW I typed?", a:"Because for an <b>in-chain base in Nucleoside mode</b> you enter the phosphate-free monomer mass, and the calculator adds one backbone phosphate (PO = 61.96) automatically — so the per-position number is about 62 higher. <b>Example:</b> type 244.20 → the list shows 306.16/pos. If the mass you have <i>already includes</i> the phosphate, flip the toggle to <b>+ Phosphate</b> and the per-position value will match exactly what you typed. (Conjugates don't do this — they add your mass as-is, with no phosphate.)"},
    {q:"Saving strands: History, naming, search, CSV", a:"<b>Save Strand</b> logs the current strand. Open <b>History</b> to reload any past strand, rename it, search by name or sequence, delete, or <b>Export CSV</b> (opens in Excel) with name, sequence, type, linkage, ends, length, modifications, and MW."},
  ]},
  conc: { title:"Concentration", items:[
    {q:"What does the Concentration tab do?", a:"It turns a Nanodrop reading into the molar concentration of your dissolved oligo, and helps you dilute it to a target. It uses the molecular weight from the MW Calculator tab automatically."},
    {q:"Where does the MW come from?", a:"It's <b>linked live from the MW Calculator</b> — whatever sequence you built there. Tick <b>custom</b> to type a molecular weight by hand instead (the A₂₆₀ path is disabled in that case, since it needs the sequence)."},
    {q:"Nanodrop in ng/µL vs A₂₆₀ (OD)", a:"Two reading modes. <b>ng/µL</b>: concentration = (ng/µL) ÷ MW. <b>A₂₆₀ (OD)</b>: uses Beer-Lambert, concentration = A₂₆₀ ÷ ε₂₆₀, where ε₂₆₀ is computed from your sequence (nearest-neighbor model, shown on screen). <b>Example:</b> 100 ng/µL of a 3,027 g/mol oligo ≈ 33 µM."},
    {q:"How accurate is ε₂₆₀ (the A₂₆₀ path)?", a:"For standard DNA/RNA bases ε₂₆₀ is computed with the established nearest-neighbor model and is reliable. <b>Heads-up:</b> the molar absorptivity of <b>custom monomers/conjugates</b> and an <b>inverted-base 3′ cap</b> isn't known to the calculator, so those are <b>excluded</b> from ε₂₆₀ — making the A₂₆₀→concentration result a slight under-estimate when they're present. 2′-sugar modifications (OMe/F/MOE/cEt) reuse their natural base's ε, which is a standard, very close approximation. The <b>ng/µL path and the molecular weight itself are exact</b> in all cases — if a strand has custom chemistry, prefer the ng/µL reading, or enter a known ε for the most accurate A₂₆₀ result."},
    {q:"Stock concentration output + units", a:"The big number is your stock concentration. Use the unit dropdown beside it to switch between nM / µM / mM / M — the value rescales automatically and your choice sticks."},
    {q:"Diluting the stock (C₁V₁ = C₂V₂)", a:"Enter a target concentration and final volume; the calculator tells you how much stock and how much water/buffer/diluent to mix. The stock can come from the Nanodrop result above, or tick <b>custom</b> to type a known stock concentration. <b>Example:</b> 50 µM stock → 5 µM in 100 µL means 10 µL stock + 90 µL diluent."},
    {q:"MW source with duplexes (Sense / Antisense / Duplex)", a:"When Duplex mode is on in the MW tab, a <b>MW source</b> selector appears here. Pick Sense, Antisense, or Duplex and all the concentration math (and ε₂₆₀ for the A₂₆₀ path) uses that strand."},
  ]},
  about: { title:"About", items:[
    {q:"About this tool & who built it", a:"<b>Oligo MW &amp; Concentration Calculator</b> is a free tool for oligonucleotide molecular weight, extinction coefficient (ε<sub>260</sub>), concentration, and dilution. It supports DNA / RNA / hybrid strands, modified bases, phosphorothioate &amp; mixed backbones, 5′ and 3′ end groups, user-defined custom monomers and conjugates, and duplexes (siRNA / ASO).<br><br>Created and developed by <b>Yu-Sheng (Albert) Chen</b>.<br><br>If this calculator supports your research, please cite it:<br><br>Chen, Y.-S. (2026). <i>Oligo MW &amp; Concentration Calculator</i>. Zenodo. <a href=\"https://doi.org/10.5281/zenodo.20842890\" target=\"_blank\" rel=\"noopener\">https://doi.org/10.5281/zenodo.20842890</a><br><br>The DOI <b>10.5281/zenodo.20842890</b> always resolves to the latest version."},
    {q:"Why build this?", a:"As a PhD oligonucleotide chemist, I got tired of bouncing between a dozen different websites and home-made Excel sheets just to confirm one set of numbers: molecular weight in one place, extinction coefficient in another, a dilution calculator somewhere else, modified-base and phosphorothioate masses buried in a vendor PDF. Every value lived somewhere different, and none of the tools talked to each other.<br><br>This is the one-stop shop I always wanted: molecular weight, ε<sub>260</sub>, concentration, dilution, modified bases, phosphorothioate &amp; mixed backbones, 5′ and 3′ end groups, custom monomers and conjugates, and full duplexes (siRNA / ASO), all in a single, consistent workflow. Enter your sequence once and everything flows from it.<br><br>It's built for the whole biochemistry community, from students designing their first primers, to biologists quantifying their PCR products, to biochemists designing siRNA and ASO therapeutics. It saves time, cuts errors, and makes the everyday math of oligonucleotide work effortless."},
  ]}
};
function renderFaq(){
  const order = (S.tab==='conc') ? ['about','conc','mw'] : ['about','mw','conc'];
  const html = order.map(key=>{ const sec=FAQ_DATA[key];
    return `<div class="faq-sec"><div class="faq-sectitle">${sec.title}</div>`+
      sec.items.map(it=>`<details class="faq-item"><summary>${it.q}</summary><div class="faq-ans">${it.a}</div></details>`).join("")+
      `</div>`;
  }).join("");
  calcs.forEach(c=>{ const b=c.querySelector("[data-faqbody]"); if(b) b.innerHTML=html; });
}
let faqOpen=false;
function setFaq(open){ faqOpen=open; calcs.forEach(c=>{ const f=c.querySelector("[data-faq]"); if(f) f.hidden=!open; }); if(open) renderFaq(); }
document.querySelector(".kit").addEventListener("click", e=>{
  if(e.target.closest("[data-faqopen]")){ setFaq(true); return; }
  if(e.target.closest("[data-faqclose]")){ setFaq(false); return; }
});

/* boot */
rebuildCustom();
buildPanel();
applyAll();
</script>
